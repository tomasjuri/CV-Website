<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="AI-powered 3D print failure detection – a computer vision project by Tomáš Juřica." />
        <meta name="author" content="Tomáš Juřica" />
        <title>3D Print Monitoring – Tomáš Juřica</title>
        <link rel="icon" type="image/x-icon" href="../cv/assets/img/favicon.ico" />
        <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
        <link href="https://fonts.googleapis.com/css?family=Saira+Extra+Condensed:500,700" rel="stylesheet" type="text/css" />
        <link href="https://fonts.googleapis.com/css?family=Muli:400,400i,800,800i" rel="stylesheet" type="text/css" />
        <link href="../cv/css/styles.css" rel="stylesheet" />
        <style>
            /* ── Sidebar: hide hamburger, style back link ────────────────── */
            #sideNav .navbar-toggler { display: none !important; }

            .back-btn {
                display: block;
                text-decoration: none;
                color: rgba(255,255,255,0.6);
                font-family: 'Muli', sans-serif;
                font-size: 0.8rem;
                padding: 1rem 0.5rem;
                text-align: center;
                margin-top: auto;
            }
            .back-btn:hover { color: #fff; }

            /* Make the collapse a flex column so margin-top:auto on back-btn works */
            @media (min-width: 992px) {
                #sideNav .navbar-collapse {
                    flex-direction: column !important;
                    height: 100% !important;
                }
            }

            /* On desktop: neutralize CV's auto-margin that pushes content to the bottom */
            @media (min-width: 992px) {
                #sideNav .navbar-brand {
                    margin: 0 !important;
                    padding: 1.5rem 0.5rem !important;
                }
                #sideNav .navbar-collapse {
                    margin-bottom: 0 !important;
                }
            }

            /* ── Compact one-pager overrides ──────────────────────────────── */
            section.resume-section {
                padding-top: 1.75rem !important;
                padding-bottom: 1.75rem !important;
                min-height: unset !important;
                align-items: flex-start !important;
            }
            section.resume-section h2.mb-5 { margin-bottom: 0.75rem !important; }
            section.resume-section p.lead   { margin-bottom: 0.5rem  !important; }
            section.resume-section h1       { margin-bottom: 0       !important; }
            section.resume-section .subheading.mb-5 { margin-bottom: 1rem !important; }
            section.resume-section .fa-ul   { margin-bottom: 0       !important; }

            /* ── Layer image grid ─────────────────────────────────────────── */
            .layer-images {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 0.75rem;
                margin-top: 1rem;
            }
            .layer-images figure { margin: 0; }
            .layer-images img {
                width: 100%;
                display: block;
                border-radius: 4px;
                cursor: zoom-in;
                transition: opacity 0.15s;
            }
            .layer-images img:hover { opacity: 0.85; }
            .layer-images figcaption {
                font-size: 0.7rem;
                color: #adb5bd;
                text-align: center;
                margin-top: 0.25rem;
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }

            /* ── Lightbox ─────────────────────────────────────────────────── */
            #lightbox {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.88);
                z-index: 9999;
                align-items: center;
                justify-content: center;
                cursor: zoom-out;
            }
            #lightbox.open { display: flex; }
            #lightbox img {
                max-width: 92vw;
                max-height: 92vh;
                border-radius: 4px;
                box-shadow: 0 0 40px rgba(0,0,0,0.6);
            }
            #lightbox-close {
                position: fixed;
                top: 1rem;
                right: 1.5rem;
                color: #fff;
                font-size: 2rem;
                line-height: 1;
                cursor: pointer;
                opacity: 0.7;
            }
            #lightbox-close:hover { opacity: 1; }

            /* ── Layer entry ──────────────────────────────────────────────── */
            .layer-entry { margin-bottom: 2.5rem; }
            .layer-entry h4 { margin-bottom: 0.1rem; }
            .layer-entry .meta {
                font-size: 0.85rem;
                color: #adb5bd;
                margin-bottom: 0;
            }

            /* ── Video embed ──────────────────────────────────────────────── */
            .video-wrap { max-width: 720px; }
            .video-wrap iframe {
                width: 100%;
                aspect-ratio: 16 / 9;
                border: none;
                border-radius: 4px;
            }

            @media (max-width: 576px) {
                .layer-images { grid-template-columns: 1fr; }
            }
        </style>
    </head>
    <body id="page-top">

        <!-- Sidebar — same structure as CV, no chapter links -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top" id="sideNav">
            <a class="navbar-brand js-scroll-trigger" href="#page-top">
                <span class="d-block d-lg-none">AI 3D Print Monitoring</span>
            </a>
            <div class="collapse navbar-collapse" id="navbarResponsive">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <span class="nav-link" style="cursor:default; white-space:nowrap; font-size:1.20rem; letter-spacing:0.03rem;">AI 3D Print Monitoring</span>
                        <span class="nav-link" style="cursor:default; white-space:nowrap; font-size:0.75rem; letter-spacing:0.03rem; opacity:0.6; padding-top:0;">A side project by Tomáš Juřica</span>
                    </li>
                </ul>
                <a id="link-homepage" class="back-btn" href="#">← tomasjuri.cz</a>
            </div>
        </nav>

        <!-- Page Content (all text injected from content.js) -->
        <div class="container-fluid p-0">

            <!-- Hero + Problem -->
            <section class="resume-section" id="problem">
                <div class="resume-section-content">
                    <h1 id="hero-title" class="mb-0"></h1>
                    <div id="hero-subtitle" class="subheading mb-5"></div>
                    <h2 id="problem-heading" class="mb-5"></h2>
                    <div id="problem-body"></div>
                </div>
            </section>
            <hr class="m-0" />

            <!-- Solution -->
            <section class="resume-section" id="solution">
                <div class="resume-section-content">
                    <h2 id="solution-heading" class="mb-5"></h2>
                    <div id="solution-body"></div>
                </div>
            </section>
            <hr class="m-0" />

            <!-- Layer Timeline + Video -->
            <section class="resume-section" id="timeline">
                <div class="resume-section-content">
                    <h2 id="timeline-heading" class="mb-5"></h2>
                    <p id="timeline-intro" class="lead mb-5"></p>
                    <div id="timeline-layers"></div>
                    <p id="video-intro" class="lead mt-5 mb-4"></p>
                    <div class="video-wrap">
                        <iframe id="video-embed" allowfullscreen
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
                        </iframe>
                    </div>
                </div>
            </section>
            <hr class="m-0" />

            <!-- POC Results -->
            <section class="resume-section" id="poc">
                <div class="resume-section-content">
                    <h2 id="poc-heading" class="mb-5"></h2>
                    <ul id="poc-list" class="fa-ul mb-0"></ul>
                </div>
            </section>
            <hr class="m-0" />

            <!-- Roadmap -->
            <section class="resume-section" id="roadmap">
                <div class="resume-section-content">
                    <h2 id="roadmap-heading" class="mb-5"></h2>
                    <p id="roadmap-intro" class="lead mb-4"></p>
                    <ul id="roadmap-list" class="fa-ul mb-4"></ul>
                    <hr style="margin: 2rem -3rem;" />
                    <p id="roadmap-closing" class="lead mb-5"></p>
                    <div class="social-icons mt-4">
                        <a id="link-linkedin" class="social-icon" target="_blank"><i class="fab fa-linkedin-in"></i></a>
                        <a id="link-homepage" class="social-icon" title="Back to CV"><i class="fas fa-user"></i></a>
                    </div>
                </div>
            </section>

        </div>

        <!-- Lightbox -->
        <div id="lightbox">
            <span id="lightbox-close">&times;</span>
            <img id="lightbox-img" src="" alt="" />
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="../cv/js/scripts.js"></script>
        <script src="content.js"></script>
        <script>
            /* ── Render helpers ──────────────────────────────────────────── */
            function setText(id, html) {
                document.getElementById(id).innerHTML = html;
            }

            function setParagraphs(id, paragraphs) {
                const el = document.getElementById(id);
                el.innerHTML = paragraphs
                    .map(p => `<p class="lead">${p.trim().replace(/\s+/g, ' ')}</p>`)
                    .join('');
            }

            function buildLayerCard(layer) {
                const status = layer.passed
                    ? `<span style="color:#28a745;">[Pass]</span>`
                    : `<span style="color:#dc3545;">[Fail]</span>`;

                const metaScore = layer.passed
                    ? `${layer.score}`
                    : `<strong style="color:#dc3545;">${layer.score}</strong> ${layer.failNote}`;

                const thumb = (path) => path.replace(/(\.\w+)$/, '_thumb$1');

                return `
                    <div class="layer-entry">
                        <h4 class="mb-0">Layer ${layer.number} ${status}</h4>
                        <p class="meta">Z height: ${layer.height}, model score: ${metaScore}</p>
                        <div class="layer-images">
                            <figure>
                                <img src="${thumb(layer.images.render)}"  data-full="${layer.images.render}"  alt="GCode render layer ${layer.number}"  loading="lazy" />
                                <figcaption>GCode render</figcaption>
                            </figure>
                            <figure>
                                <img src="${thumb(layer.images.capture)}" data-full="${layer.images.capture}" alt="Camera capture layer ${layer.number}" loading="lazy" />
                                <figcaption>Camera capture</figcaption>
                            </figure>
                            <figure>
                                <img src="${thumb(layer.images.overlay)}" data-full="${layer.images.overlay}" alt="Model output layer ${layer.number}"  loading="lazy" />
                                <figcaption>Model output</figcaption>
                            </figure>
                        </div>
                    </div>`;
            }

            /* ── Populate from CONTENT ───────────────────────────────────── */
            // Hero
            setText('hero-title',
                `${CONTENT.hero.title} <span class="text-primary">${CONTENT.hero.titleAccent}</span>`);
            setText('hero-subtitle', CONTENT.hero.subtitle);

            // Problem
            setText('problem-heading', CONTENT.problem.heading);
            setParagraphs('problem-body', CONTENT.problem.paragraphs);

            // Solution
            setText('solution-heading', CONTENT.solution.heading);
            setParagraphs('solution-body', CONTENT.solution.paragraphs);

            // Timeline
            setText('timeline-heading', CONTENT.timeline.heading);
            setText('timeline-intro', CONTENT.timeline.intro.trim().replace(/\s+/g, ' '));
            document.getElementById('timeline-layers').innerHTML =
                CONTENT.timeline.layers.map(buildLayerCard).join('');

            // Video
            setText('video-intro', CONTENT.video.intro.trim().replace(/\s+/g, ' '));
            document.getElementById('video-embed').src =
                `https://www.youtube.com/embed/${CONTENT.video.youtubeId}`;

            // POC
            setText('poc-heading', CONTENT.poc.heading);
            document.getElementById('poc-list').innerHTML = CONTENT.poc.items
                .map(item => `
                    <li>
                        <span class="fa-li"><i class="fas fa-check"></i></span>
                        ${item}
                    </li>`)
                .join('');

            // Roadmap
            setText('roadmap-heading', CONTENT.roadmap.heading);
            setText('roadmap-intro', CONTENT.roadmap.intro.trim().replace(/\s+/g, ' '));
            document.getElementById('roadmap-list').innerHTML = CONTENT.roadmap.items
                .map(item => `
                    <li>
                        <span class="fa-li"><i class="fas fa-arrow-right text-primary"></i></span>
                        <strong>${item.label}.</strong> ${item.text.trim().replace(/\s+/g, ' ')}
                    </li>`)
                .join('');
            setText('roadmap-closing', CONTENT.links.closing);

            // Links
            document.getElementById('link-linkedin').href  = CONTENT.links.linkedin;
            document.getElementById('link-homepage').href  = CONTENT.links.homepage;

            /* ── Lightbox ────────────────────────────────────────────────── */
            const lb    = document.getElementById('lightbox');
            const lbImg = document.getElementById('lightbox-img');

            document.querySelector('.page-content').addEventListener('click', e => {
                const img = e.target.closest('.layer-images img');
                if (!img) return;
                lbImg.src = img.dataset.full || img.src;
                lbImg.alt = img.alt;
                lb.classList.add('open');
            });

            lb.addEventListener('click', () => lb.classList.remove('open'));
            document.getElementById('lightbox-close').addEventListener('click', () => lb.classList.remove('open'));
            document.addEventListener('keydown', e => { if (e.key === 'Escape') lb.classList.remove('open'); });
        </script>
    </body>
</html>
